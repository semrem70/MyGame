<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кто хочет стать миллионером?</title>
    <style>
        body {
            background-color: #000033;
            background: radial-gradient(circle, #000066 0%, #000022 100%);
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container, #start-screen {
            width: 100%;
            max-width: 800px;
            text-align: center;
            padding: 20px;
        }

        #game-container { display: none; }

        .start-btn {
            background: #d4af37; color: black; border: none; padding: 20px 50px;
            font-size: 1.5em; font-weight: bold; border-radius: 50px; cursor: pointer;
        }

        #question-box {
            background: linear-gradient(90deg, transparent 0%, #000088 50%, transparent 100%);
            border-top: 2px solid #5555ff; border-bottom: 2px solid #5555ff;
            padding: 30px; margin-bottom: 40px; font-size: 1.5em;
        }

        #options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .option-btn {
            background: black; border: 1px solid #5555ff; border-radius: 40px;
            padding: 15px 20px; color: white; font-size: 1.1em; cursor: pointer; text-align: left;
        }

        .correct { background: #27ae60 !important; }
        .wrong { background: #cc0000 !important; }
        .pending { background: #d4af37 !important; color: black !important; }

        /* СТИЛИ ДЛЯ КАРТИНКИ */
        #image-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #image-overlay img { max-width: 80%; max-height: 70%; border: 5px solid #d4af37; border-radius: 10px; }
        #timer-text { margin-top: 20px; font-size: 1.5em; color: #d4af37; }
    </style>
</head>
<body>

<div id="start-screen">
    <h1>КТО ХОЧЕТ СТАТЬ МИЛЛИОНЕРОМ?</h1>
    <button class="start-btn" onclick="startGame()">Начать игру</button>
</div>

<div id="game-container">
    <div id="question-box"><span id="question-text"></span></div>
    <div id="options-grid"></div>
    <div id="message" style="margin-top: 20px;"></div>
</div>

<!-- Оверлей для показа картинки -->
<div id="image-overlay">
    <img id="reward-image" src="" alt="Правильно!">
    <div id="timer-text">Следующий вопрос через 10 сек...</div>
</div>

        },
        { 
            q: "Как официально называется столица Японии?", 
            options: ["Киото", "Осака", "Токио", "Сеул"], 
            correct: 2,
            img: "https://placehold.co"
        }
    ];

    let currentStep = 0;

    function startGame() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';
        loadQuestion();
    }

    function loadQuestion() {
        const data = quizData[currentStep];
        document.getElementById('question-text').innerText = data.q;
        document.getElementById('options-grid').innerHTML = '';
        document.getElementById('message').innerText = '';

        data.options.forEach((text, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<b>${String.fromCharCode(65 + idx)}:</b> ${text}`;
            btn.onclick = () => checkAnswer(idx, btn);
            document.getElementById('options-grid').appendChild(btn);
        });
    }

    function checkAnswer(chosenIdx, clickedBtn) {
        const data = quizData[currentStep];
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(b => b.disabled = true);
        
        clickedBtn.classList.add('pending');
        sounds.wait.play();

        setTimeout(() => {
            if (chosenIdx === data.correct) {
                sounds.correct.play();
                clickedBtn.classList.replace('pending', 'correct');
                
                // Через секунду после зеленого цвета показываем картинку
                setTimeout(() => showImage(data.img), 1000);
            } else {
                sounds.wrong.play();
                clickedBtn.classList.replace('pending', 'wrong');
                document.getElementById('message').innerText = "Неверно! Попробуйте другой вариант.";
                setTimeout(() => {
                    allBtns.forEach(b => { if (!b.classList.contains('wrong')) b.disabled = false; });
                }, 1000);
            }
        }, 1200);
    }

    function showImage(src) {
        const overlay = document.getElementById('image-overlay');
        const img = document.getElementById('reward-image');
        const timerText = document.getElementById('timer-text');
        let timeLeft = 10;

        img.src = src;
        overlay.style.display = 'flex';
        
        const timerId = setInterval(() => {
            timeLeft--;
            timerText.innerText = `Следующий вопрос через ${timeLeft} сек...`;
            if (timeLeft <= 0) {
                clearInterval(timerId);
                overlay.style.display = 'none';
                nextQuestion();
            }
        }, 1000);
    }

    function nextQuestion() {
        currentStep++;
        if (currentStep < quizData.length) {
            loadQuestion();
        } else {
            document.getElementById('game-container').innerHTML = "<h1>ПОБЕДА! 💰</h1>";
        }
    }
</script>
